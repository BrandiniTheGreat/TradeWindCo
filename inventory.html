<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventory — Trade Wind &amp; Co.</title>
  <meta name="description" content="Current catamaran inventory — each boat duty-paid and delivered to your US marina at $50K-$100K below comparable US-listed inventory." />
  <meta name="theme-color" content="#1f6e72" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header" data-header></header>

<section class="inventory-hero">
  <div class="container">
    <h1>Current Inventory</h1>
    <p>Each catamaran below is available now, sourced from a major charter-fleet phase-out, and priced delivered to your US marina with all duty, customs, and delivery already in the number.</p>
  </div>
</section>

<section class="section" style="padding-top:48px;">
  <div class="container">
    <div class="filter-bar">
      <span class="filter-label">Length</span>
      <button class="filter-chip active" data-cat="all">All</button>
      <button class="filter-chip" data-cat="40ft">40 ft</button>
      <button class="filter-chip" data-cat="45ft">45 ft</button>
      <button class="filter-chip" data-cat="50ft">50 ft</button>
      <span class="filter-divider"></span>
      <span class="filter-label">Delivered Price</span>
      <button class="filter-chip active" data-price="all">All</button>
      <button class="filter-chip" data-price="under-500">Under $500K</button>
      <button class="filter-chip" data-price="500-750">$500K – $750K</button>
      <button class="filter-chip" data-price="750-plus">$750K+</button>
      <span class="filter-spacer"></span>
      <span class="filter-count"><strong id="count">0</strong> catamarans showing</span>
    </div>
    <div class="grid-listings" id="grid"></div>
  </div>
</section>

<footer class="site-footer" data-footer></footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  mountHeader('inventory');
  mountFooter();

  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const catChips = document.querySelectorAll('.filter-chip[data-cat]');
  const priceChips = document.querySelectorAll('.filter-chip[data-price]');

  let currentCat = 'all';
  let currentPrice = 'all';

  function render() {
    const items = priceFilter(categoryFilter(BOATS, currentCat), currentPrice);
    grid.innerHTML = items.length
      ? items.map(renderListingCard).join('')
      : `<div style="grid-column: 1 / -1; padding: 60px 0; text-align: center; color: var(--text-3); font-style: italic;">No catamarans match this filter. Try widening the criteria — or <a href="#" style="color:var(--teal);">tell us what you're looking for</a> and we'll source it.</div>`;
    countEl.textContent = items.length;
  }

  catChips.forEach((c) => {
    c.addEventListener('click', () => {
      catChips.forEach((x) => x.classList.remove('active'));
      c.classList.add('active');
      currentCat = c.dataset.cat;
      render();
    });
  });

  priceChips.forEach((c) => {
    c.addEventListener('click', () => {
      priceChips.forEach((x) => x.classList.remove('active'));
      c.classList.add('active');
      currentPrice = c.dataset.price;
      render();
    });
  });

  // Initial filter from URL ?cat=
  const initCat = getQueryParam('cat') || 'all';
  const initChip = document.querySelector(`.filter-chip[data-cat="${initCat}"]`);
  if (initChip) {
    catChips.forEach((x) => x.classList.remove('active'));
    initChip.classList.add('active');
    currentCat = initCat;
  }
  render();
</script>

</body>
</html>
